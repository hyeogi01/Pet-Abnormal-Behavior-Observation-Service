version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/app
      - ./backend/FastAPI/key:/app/key:ro
      - ./AI Model/AI_pth:/app/AI_pth:ro
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # 외부 클라이언트가 이미지에 접근할 때 사용하는 공개 URL (nginx를 통해 MinIO로 프록시됨)
      # 배포 시 실제 서버 도메인으로 변경 필요 (예: https://your-domain.com)
      - MINIO_PUBLIC_URL=https://tissue-leverage-diocese.ngrok-free.dev
    depends_on:
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    # Run Uvicorn directly for the backend
    command: [ "uvicorn", "FastAPI.main.Test:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
